backend:
  name: github
  repo: ajarindsite/web
  branch: main

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "hero"
    label: "Hero Section"
    folder: "content/hero"
    create: false
    fields:
      - {label: "Judul Utama", name: "title", widget: "string"}
      - {label: "Subtitle", name: "subtitle", widget: "text"}

  - name: "programs"
    label: "Program Andalan"
    folder: "content/programs"
    create: false
    fields:
      - {label: "Judul Program", name: "title", widget: "string"}
      - {label: "Deskripsi", name: "description", widget: "text"}
      - {label: "Icon", name: "icon", widget: "string"}

  - name: "faq"
    label: "FAQ"
    folder: "content/faq"
    create: false
    fields:
      - {label: "Pertanyaan", name: "question", widget: "string"}
      - {label: "Jawaban", name: "answer", widget: "text"}

  - name: "contact"
    label: "Kontak"
    folder: "content/contact"
    create: false
    fields:
      - {label: "Alamat", name: "address", widget: "string"}
      - {label: "WhatsApp", name: "phone", widget: "string"}
      - {label: "Email", name: "email", widget: "string"}