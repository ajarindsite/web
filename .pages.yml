backend:
  name: github
  repo: Adjarindoweb/Adjarindoweb
  branch: main

site:
  title: Adjarindo Creative Aksara
  base_url: https://adjarindo.pages.dev

collections:
  - name: "hero"
    label: "Hero Section"
    files:
      - name: "hero_content"
        label: "Konten Hero"
        path: "index.html"
        selector: "[data-cms-edit^='hero.']"
        fields:
          - name: "hero.title"
            label: "Judul Utama Hero"
            type: "string"
          - name: "hero.subtitle"
            label: "Subtitle / Deskripsi Hero"
            type: "text"

  - name: "advantages"
    label: "Keunggulan (4 item)"
    path: "index.html"
    selector: "[data-cms-edit^='advantages.']"
    fields:
      - name: "advantages.1"
        label: "Keunggulan 1 - Zero Code"
        type: "html"
      - name: "advantages.2"
        label: "Keunggulan 2 - Low Cost"
        type: "html"
      - name: "advantages.3"
        label: "Keunggulan 3 - High Performance"
        type: "html"
      - name: "advantages.4"
        label: "Keunggulan 4 - Pendampingan HRD"
        type: "html"

  - name: "programs"
    label: "3 Program Andalan"
    path: "index.html"
    selector: "[data-cms-edit^='programs.']"
    fields:
      - name: "programs.section_title"
        label: "Judul Section Program"
        type: "string"
      - name: "programs.program_1"
        label: "Program 1 - Smart School Transformation"
        type: "html"
      - name: "programs.program_2"
        label: "Program 2 - Kedinasan & Karir Hub"
        type: "html"
      - name: "programs.program_3"
        label: "Program 3 - Guru Kreatif Digital"
        type: "html"

  - name: "gallery"
    label: "Galeri Kegiatan"
    path: "index.html"
    selector: "[data-cms-edit^='gallery.']"
    fields:
      - name: "gallery.section_title"
        label: "Judul Section Galeri"
        type: "string"
      - name: "gallery.item_1"
        label: "Galeri Item 1"
        type: "object"
        fields:
          - name: "title"
            label: "Judul"
            type: "string"
          - name: "desc"
            label: "Deskripsi"
            type: "text"
          - name: "img"
            label: "URL Gambar"
            type: "string"
      - name: "gallery.item_2"
        label: "Galeri Item 2"
        type: "object"
        fields:
          - name: "title"
            label: "Judul"
            type: "string"
          - name: "desc"
            label: "Deskripsi"
            type: "text"
          - name: "img"
            label: "URL Gambar"
            type: "string"
      - name: "gallery.item_3"
        label: "Galeri Item 3"
        type: "object"
        fields:
          - name: "title"
            label: "Judul"
            type: "string"
          - name: "desc"
            label: "Deskripsi"
            type: "text"
          - name: "img"
            label: "URL Gambar"
            type: "string"
      - name: "gallery.item_4"
        label: "Galeri Item 4"
        type: "object"
        fields:
          - name: "title"
            label: "Judul"
            type: "string"
          - name: "desc"
            label: "Deskripsi"
            type: "text"
          - name: "img"
            label: "URL Gambar"
            type: "string"

  - name: "faq"
    label: "FAQ (Tanya Jawab)"
    path: "index.html"
    selector: "[data-cms-edit^='faq.']"
    fields:
      - name: "faq.section_title"
        label: "Judul Section FAQ"
        type: "string"
      - name: "faq.item_1"
        label: "FAQ 1"
        type: "object"
        fields:
          - name: "q"
            label: "Pertanyaan"
            type: "string"
